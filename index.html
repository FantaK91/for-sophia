<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f48fb3" />
  <title>Carta para ti</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="stage active" data-stage="0" aria-label="Carta para ti">
      <img class="stage-image" src="assets/page1.png" alt="Carta para ti, sobre cerrado" />
      <button class="hotspot full" aria-label="Abrir carta" data-next></button>
    </section>

    <section class="stage" data-stage="1" aria-label="Sobre abierto">
      <img class="stage-image" src="assets/page2.png" alt="Sobre abierto con carta" />
      <button class="hotspot full" aria-label="Leer la carta" data-next></button>
    </section>

    <section class="stage" data-stage="2" aria-label="Carta principal">
      <img class="stage-image" src="assets/page3.png" alt="Carta completa con regalo" />
      <button class="hotspot gift" aria-label="Abrir regalo" data-next></button>
    </section>

    <section class="stage stage-dark" data-stage="3" aria-label="Regalo sorpresa">
      <img class="stage-image" src="assets/page4.png" alt="Regalo sorpresa" />
      <button class="hotspot gift" aria-label="Abrir gift card" data-next></button>
    </section>

    <section class="stage stage-dark" data-stage="4" aria-label="Gift card Roblox">
      <img class="stage-image card-image card-front" src="assets/code-front.png" alt="Gift card Roblox" />
      <button class="hotspot full" aria-label="Revelar código" data-next></button>
    </section>

    <section class="stage stage-dark video-stage" data-stage="5" aria-label="Código de la gift card">
      <video class="bg-video" id="bgVideo" playsinline preload="auto" loop>
        <source src="assets/tung-tung.mp4" type="video/mp4" />
      </video>
      <div class="dark-overlay"></div>
      <img class="stage-image card-image card-code" src="assets/code-back.png" alt="Código de la gift card" />
      <button class="hotspot full" aria-label="Continuar al video" data-next></button>
    </section>

    <section class="stage stage-dark video-stage final" data-stage="6" aria-label="Video final">
      <video class="bg-video" id="bgVideoFinal" playsinline preload="auto" loop>
        <source src="assets/tung-tung.mp4" type="video/mp4" />
      </video>
      <div class="dark-overlay stronger"></div>
      <img class="stage-image card-image card-code final-code" src="assets/code-back.png" alt="Código sobre video" />
    </section>

    <div class="corner-glow corner-a"></div>
    <div class="corner-glow corner-b"></div>
    <div class="corner-glow corner-c"></div>
    <div class="corner-glow corner-d"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
